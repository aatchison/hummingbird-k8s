# Align cloud-init's user model with the Hummingbird sudoless / root-SSH
# model (see etc/ssh/sshd_config.d/99-no-passwords.conf and PR #24). Without
# these overrides, cloud-init's Fedora defaults create a `fedora` user and
# set `disable_root: true`, which conflicts with the bib-baked root SSH key.
disable_root: false
users: []
