# Hummingbird datasource ordering. NoCloud is the canonical path for
# libvirt seed ISOs (the `virt-install --cloud-init` flow); ConfigDrive +
# OpenStack are kept as fallbacks for cloud providers that support them.
# `None` at the end means cloud-init exits cleanly when no datasource is
# available, rather than blocking boot.
datasource_list: [ NoCloud, ConfigDrive, OpenStack, None ]
