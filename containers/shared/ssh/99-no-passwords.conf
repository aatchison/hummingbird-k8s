PasswordAuthentication no
ChallengeResponseAuthentication no
KbdInteractiveAuthentication no
PermitRootLogin prohibit-password

# Rate-limit auth attempts: drop the connection after 3 failures (#75).
MaxAuthTries 3
# Kick idle login attempts that don't complete auth within 30s (#75).
LoginGraceTime 30

# Disconnect idle / unresponsive SSH sessions: a probe every 5min,
# disconnect after 2 missed probes (~10min of unresponsiveness) (#75).
ClientAliveInterval 300
ClientAliveCountMax 2

# VERBOSE logs the public-key fingerprint that authenticated each
# session, giving us a per-key audit trail in the journal (#77).
LogLevel VERBOSE
