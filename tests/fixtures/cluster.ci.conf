# tests/fixtures/cluster.ci.conf — CI integration-test cluster fixture
#
# ============================================================================
# DO NOT COPY THIS FILE FOR A REAL CLUSTER.
# ============================================================================
# This file ships values that are safe ONLY for the throwaway self-hosted
# runner: tiny VM sizes (3072/2048 MB), `localhost` KVM_HOST, RUN_VERIFY=false
# (which skips the post-deploy hardening + app-deploy smoke test). Operators
# starting a real cluster should copy `cluster.example.conf`, NOT this one.
#
# Additionally, the workflows REWRITE the hbird-ci-* names in-place per-run
# (see "Render per-run cluster.ci.conf" step) to avoid libvirt-domain-name
# collisions across concurrent runs. The on-disk values you see here are
# template defaults, not the values used at runtime.
# ============================================================================
#
# Consumed by:
#   .github/workflows/integration-update-cluster.yml
#   .github/workflows/integration-export-argocd.yml
#
# Smallest topology that exercises rolling-update semantics: 1 CP + 2
# workers. Two workers (not one) ensure the workflow asserts the
# "iterate over WORKER_NAMES" loop, not just a single happy path.
#
# Names are prefixed `hbird-ci-` so the always-run teardown step in the
# workflows can grep them out of `virsh list --all --name` without
# touching production `hummingbird-*` domains. The runner itself owns
# this fixture's namespace.
#
# This is sourced as bash by deploy-cluster.sh / update-cluster.sh /
# export-argocd.sh; keep it side-effect-free.

# The integration runner runs libvirt locally — no ProxyJump needed.
KVM_HOST=localhost

# Libvirt domain names. The kubelet derives its own hostname from the
# machine-id at first boot (humbird-cp-<id> / humbird-worker-<id>); these
# names live in libvirt only.
CP_NAME=hbird-ci-cp1
WORKER_NAMES=(hbird-ci-w1 hbird-ci-w2)

# Throwaway SSH identity the workflow generates per-run (see the
# "Generate runner SSH key" step). Never reused across runs and not
# checked in.
SSH_PUBKEY_FILE=$HOME/.ssh/integration_test_key.pub

# IPs intentionally NOT pinned — let `virsh domifaddr` resolve them at
# deploy / update time. This mirrors the canonical operator flow and
# exercises the resolve_vm_ip() path in update-cluster.sh.

# Smallest memory footprint that boots a working CP / kubelet pair.
# The runner host has ~16GB; 3+2+2 = 7 GiB total leaves headroom.
CP_MEMORY=3072
WORKER_MEMORY=2048

# Image source: the workflow_run trigger fires on a successful Build &
# publish hummingbird-k8s tag-driven run, so :latest IS the image we
# just published. No need to pin a tag.
IMAGE_SOURCE=ghcr
GHCR_TAG=latest

# Skip the post-deploy verify suite — the integration workflows run
# their own targeted assertions and we don't want a verify-app-deploy
# failure to mask the update-cluster / export-argocd checks.
RUN_VERIFY=false

ENABLE_CLOUD_INIT=1
