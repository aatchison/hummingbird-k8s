# Operator-edited cluster config. Copy to cluster.local.conf and edit.
# Sourced by scripts/deploy-cluster.sh AND scripts/update-cluster.sh — the
# same config drives both deploy and rolling-update flows.
#
# This is the entry point for the "deploy a real cluster" path
# (docs/deploy-cluster.md). It is distinct from config.local.sh, which
# tunes image-build inputs for the individual scripts/build-*.sh scripts.

# KVM host alias (must be SSH-reachable from wherever you'll run kubectl).
# The deploy script itself runs ON the KVM host — KVM_HOST is recorded so
# downstream tooling (scripts/kubectl-k8s.sh) can rewrite the apiserver
# URL when consuming the kubeconfig from a remote client. Leave unset if
# you only ever kubectl from the KVM host directly.
KVM_HOST=thenewhost

# Libvirt domain names. CP is a single VM; workers are a bash array.
CP_NAME=hbird-cp1
WORKER_NAMES=(hbird-w1 hbird-w2)

# Optional: pin CP/worker IPs instead of relying on `virsh domifaddr` lookup.
# Useful for clusters with static addressing or when running scripts that
# need a CP IP (deploy-cluster.sh, update-cluster.sh, export-argocd.sh)
# from a workstation without libvirt access to the CP's domain — e.g.
# producing an ArgoCD kubeconfig remotely. If unset, scripts resolve via
# `virsh domifaddr "$CP_NAME"` on the local KVM host. WORKER_IPS (when
# set) must be parallel to WORKER_NAMES.
# CP_IP=192.168.122.10
# WORKER_IPS=(192.168.122.11 192.168.122.12)

# SSH public key baked into the bib image's default user AND embedded in
# each VM's cloud-init seed (so the bib-baked + cloud-init-baked key sets
# agree). REQUIRED.
SSH_PUBKEY_FILE=$HOME/.ssh/id_ed25519.pub

# Image source.
#   ghcr  — pull the published images from GHCR.
#   local — build fresh from this repo (containers/k8s, containers/k8s-worker).
IMAGE_SOURCE=ghcr
GHCR_TAG=latest

# Cloud-init is the dynamic-state carrier for this flow (hostname, worker
# join token, post-boot runcmd). MUST be 1 — the script refuses to run
# otherwise. See docs/cloud-init.md for the build-arg's effect.
ENABLE_CLOUD_INIT=1

# Behavioral knobs.
#
# AUTO_UPDATE_CP=true:
#   The CP image ships with bootc-fetch-apply-updates.timer disabled (#48,
#   the rationale being that auto-rolling the control plane is risky for
#   a homelab). Setting this to true emits a runcmd in the CP's cloud-init
#   user-data that enables the timer immediately after first boot. False
#   omits the runcmd entirely — no half-baked enable-then-systemctl-no-op.
#
# SWITCH_TO_GHCR=true:
#   Emit a `bootc switch ghcr.io/aatchison/hummingbird-k8s:<TAG>` runcmd so
#   the auto-update timer (when enabled) has a remote ref to pull from.
#   Mirrors scripts/switch-to-ghcr.sh's behavior, only via cloud-init
#   instead of post-deploy SSH. Workers always get the equivalent switch
#   for hummingbird-k8s-worker:<TAG>.
AUTO_UPDATE_CP=true
SWITCH_TO_GHCR=true

# Per-flavor VM sizing. CP defaults to 8192M / 4 vCPUs; each worker
# defaults to 4096M / 2 vCPUs. Override as needed for your host capacity.
# CP_MEMORY=8192
# CP_VCPUS=4
# WORKER_MEMORY=4096
# WORKER_VCPUS=2

# Libvirt storage pool directory. Defaults match lib/build-common.sh.
# POOL_DIR=/var/lib/libvirt/images

# Optional: run scripts/verify-app-deploy.sh after the cluster comes Ready.
# RUN_VERIFY=true

# Override the default daily bootc-semver-update timer schedule. Accepts any
# systemd OnCalendar= value. Leave commented to use the image default (daily
# with a 30-min randomized delay). Examples:
#   BOOTC_UPDATE_SCHEDULE="Mon *-*-* 03:00:00"   # weekly Monday 3 AM
#   BOOTC_UPDATE_SCHEDULE="*:0/15"               # every 15 min (testing)
#   BOOTC_UPDATE_SCHEDULE="hourly"
# The drop-in is written by cloud-init at first boot and the timer is
# reloaded immediately — see docs/deploy-cluster.md for the full flow.
# BOOTC_UPDATE_SCHEDULE=

# Override the default registry repo for bootc-semver-update. Format: a full
# OCI ref WITHOUT the tag. Defaults are baked per-flavor at image build:
#   BOOTC_UPDATE_REPO_K8S=ghcr.io/yourname/hummingbird-k8s
#   BOOTC_UPDATE_REPO_WORKER=ghcr.io/yourname/hummingbird-k8s-worker
# When set, cloud-init rewrites /etc/hummingbird/bootc-update.env on the matching node
# so the semver-update unit reads the operator's REPO instead of the baked
# default. PREFIX stays "v" — change in the image if you need a different
# tag prefix convention.
# BOOTC_UPDATE_REPO_K8S=
# BOOTC_UPDATE_REPO_WORKER=
