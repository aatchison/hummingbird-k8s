name: Build & publish — hummingbird-k8s

on:
  push:
    tags: ['k8s/v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver tag (vX.Y.Z)'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Refuse to publish if the tagged commit isn't on main
        if: github.event_name == 'push'
        run: |
          git fetch --no-tags --depth=1 origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag $GITHUB_REF points to $GITHUB_SHA, not reachable from origin/main." >&2
            exit 1
          fi

      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF#refs/tags/k8s/}"
          fi
          if ! [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Version $version is not vX.Y.Z[-pre]" >&2; exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Third-party actions pinned to commit SHAs (bump via Renovate/Dependabot).
      - name: Log in to GHCR
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1.7
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Resolve the canonical Containerfile path from the Makefile so the
      # build-* workflows track repo layout changes via a single source.
      - name: Resolve Containerfile path from Makefile
        id: cf
        run: echo "path=$(make -s print-containerfile-k8s)" >> "$GITHUB_OUTPUT"

      - name: Build
        id: build
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2.13
        with:
          image: hummingbird-k8s
          tags: ${{ steps.v.outputs.version }} latest
          containerfiles: ${{ steps.cf.outputs.path }}
          context: .

      - name: Push to GHCR
        id: push
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2.8
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ghcr.io/${{ github.repository_owner }}

      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      # Signing is by digest, which covers the single-arch (amd64) image
      # produced here. If multi-arch builds are added later, both the manifest
      # index AND each per-arch child manifest must be signed.
      - name: Sign image with cosign (keyless, OIDC)
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/hummingbird-k8s
          DIGEST: ${{ steps.push.outputs.digest }}
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          if [ -z "$DIGEST" ]; then
            echo "push step did not emit a digest; falling back to podman manifest inspect" >&2
            DIGEST="$(podman manifest inspect --verbose "${IMAGE}:${VERSION}" \
              | jq -r '.Digest // .digest')"
          fi
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "null" ]; then
            echo "could not determine image digest" >&2; exit 1
          fi
          cosign sign --yes "${IMAGE}@${DIGEST}"
