name: Integration — export-argocd kubeconfig (#196)

# End-to-end exercise of scripts/export-argocd.sh (PR #188) against a
# real 1-CP + 2-worker cluster on the self-hosted kvm/libvirt runner.
#
# Asserts the full feature surface of `make export-argocd`:
#   - basic export emits a 0600 kubeconfig with rewritten server URL +
#     hummingbird-<CP_NAME> context.
#   - the emitted kubeconfig is actually usable: `kubectl get nodes`
#     via KUBECONFIG=<exported> returns the CP node.
#   - refuse-to-clobber: a second run without --force exits non-zero.
#   - --force overwrites cleanly.
#   - a hostile --server URL is rejected BEFORE any rewrite touches the
#     filesystem.
#   - (PR #197) a sibling `make get-kubeconfig` produces a kubeconfig with
#     the CP_NAME context (no hummingbird- prefix). Gated on the Make
#     target being present.
#
# Trigger surface mirrors integration-update-cluster.yml:
#   workflow_dispatch + workflow_run on Build & publish hummingbird-k8s.

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ['Build & publish — hummingbird-k8s']
    types: [completed]

permissions:
  contents: read
  packages: read

jobs:
  export-argocd:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, kvm, libvirt]
    timeout-minutes: 30
    env:
      STORAGE_DRIVER: vfs
      PODMAN_ROOT: /var/lib/integration-storage/${{ github.run_id }}
      PODMAN_RUNROOT: /run/integration-storage/${{ github.run_id }}
      CONFIG: tests/fixtures/cluster.ci.conf
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install runner deps (CNI + virtinst + genisoimage + kubectl + yq)
        # Mirrors integration-update-cluster.yml's deps list. kubectl is
        # added for the "kubeconfig usable" assertion. yq (Go flavor) is
        # already preferred by export-argocd.sh; if it's missing the
        # script falls back to its sed path — both are valid, but
        # installing yq lets us exercise the canonical path here.
        run: |
          set -euo pipefail
          need=()
          { ls /usr/lib/cni/bridge >/dev/null 2>&1 \
              || ls /usr/libexec/cni/bridge >/dev/null 2>&1 \
              || ls /opt/cni/bin/bridge >/dev/null 2>&1 ; } \
              || need+=(containernetworking-plugins)
          command -v virt-install >/dev/null 2>&1 || need+=(virtinst)
          command -v virsh        >/dev/null 2>&1 || need+=(libvirt-clients)
          command -v genisoimage  >/dev/null 2>&1 || need+=(genisoimage)
          command -v kubectl      >/dev/null 2>&1 || need+=(kubectl)
          if [[ ${#need[@]} -gt 0 ]]; then
            sudo apt-get update -q
            sudo apt-get install -y -q "${need[@]}"
          fi

      - name: Generate runner SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          rm -f ~/.ssh/integration_test_key ~/.ssh/integration_test_key.pub
          ssh-keygen -t ed25519 -N '' -f ~/.ssh/integration_test_key -C "hbird-ci-${{ github.run_id }}"

      - name: Prepare isolated podman storage
        run: |
          set -euo pipefail
          sudo rm -rf "${PODMAN_ROOT}" "${PODMAN_RUNROOT}"
          sudo mkdir -p "${PODMAN_ROOT}" "${PODMAN_RUNROOT}"

      - name: Deploy 1-CP + 2-worker cluster
        run: |
          set -euo pipefail
          sudo --preserve-env=STORAGE_DRIVER,PODMAN_ROOT,PODMAN_RUNROOT \
            make deploy-cluster CONFIG="${CONFIG}"

      - name: Test 1 — basic export
        run: |
          set -euo pipefail
          # shellcheck disable=SC1090
          source "${CONFIG}"

          rm -f /tmp/ci-kubeconfig.yaml
          make export-argocd CONFIG="${CONFIG}" OUTPUT=/tmp/ci-kubeconfig.yaml

          if [[ ! -f /tmp/ci-kubeconfig.yaml ]]; then
            echo "::error::export did not produce /tmp/ci-kubeconfig.yaml"
            exit 1
          fi

          mode="$(stat -c '%a' /tmp/ci-kubeconfig.yaml)"
          if [[ "${mode}" != "600" ]]; then
            echo "::error::expected mode 0600 on exported kubeconfig, got ${mode}"
            exit 1
          fi

          if ! grep -q '^apiVersion: v1' /tmp/ci-kubeconfig.yaml; then
            echo "::error::exported kubeconfig missing 'apiVersion: v1'"
            exit 1
          fi
          if ! grep -q '^kind: Config' /tmp/ci-kubeconfig.yaml; then
            echo "::error::exported kubeconfig missing 'kind: Config'"
            exit 1
          fi

          # The server URL must have been rewritten to https://<CP_IP>:6443
          # (the export script's default when no --server override is given).
          CP_IP="$(sudo virsh -c qemu:///system domifaddr "${CP_NAME}" \
                   | awk '/ipv4/{split($4,a,"/"); print a[1]; exit}')"
          if ! grep -qE "server:[[:space:]]+https://${CP_IP}:6443\$" /tmp/ci-kubeconfig.yaml; then
            echo "::error::server URL not rewritten to https://${CP_IP}:6443"
            grep -E 'server:' /tmp/ci-kubeconfig.yaml || true
            exit 1
          fi

          # Context name must be hummingbird-<CP_NAME>.
          want_ctx="hummingbird-${CP_NAME}"
          if ! grep -qE "name:[[:space:]]+${want_ctx}\$" /tmp/ci-kubeconfig.yaml; then
            echo "::error::expected context name '${want_ctx}' not present"
            exit 1
          fi
          if ! grep -qE "current-context:[[:space:]]+${want_ctx}\$" /tmp/ci-kubeconfig.yaml; then
            echo "::error::current-context not set to '${want_ctx}'"
            exit 1
          fi

          echo "ok: basic export produced a sane 0600 kubeconfig"

      - name: Test 2 — exported kubeconfig is usable
        run: |
          set -euo pipefail
          # shellcheck disable=SC1090
          source "${CONFIG}"

          # The CP cert SAN list does not necessarily include this runner's
          # IP, so skip TLS verification — we only care that the kubeconfig
          # is structurally complete and reaches the apiserver. kubectl
          # against the rewritten server URL proves the rewrite worked.
          out="$(KUBECONFIG=/tmp/ci-kubeconfig.yaml \
                 kubectl --insecure-skip-tls-verify=true get nodes --no-headers)"
          if ! grep -qE "^${CP_NAME}[[:space:]]+Ready" <<<"${out}"; then
            echo "::error::exported kubeconfig does not list ${CP_NAME} as Ready"
            echo "${out}"
            exit 1
          fi
          echo "ok: kubectl via exported kubeconfig returned ${CP_NAME} Ready"

      - name: Test 3 — refuse-to-clobber without FORCE=1
        run: |
          set -euo pipefail
          set +e
          out="$(make export-argocd CONFIG="${CONFIG}" OUTPUT=/tmp/ci-kubeconfig.yaml 2>&1)"
          rc=$?
          set -e
          if [[ "${rc}" -eq 0 ]]; then
            echo "::error::expected non-zero exit when output exists and FORCE!=1, got 0"
            echo "${out}"
            exit 1
          fi
          if ! grep -qE "already exists|--force" <<<"${out}"; then
            echo "::error::refuse-to-clobber output did not mention the override flag"
            echo "${out}"
            exit 1
          fi
          echo "ok: refuse-to-clobber fired (rc=${rc})"

      - name: Test 4 — FORCE=1 overwrites
        run: |
          set -euo pipefail
          before="$(stat -c '%Y' /tmp/ci-kubeconfig.yaml)"
          # Sleep 1s so the mtime can advance even on coarse-grained FS clocks.
          sleep 1
          make export-argocd CONFIG="${CONFIG}" OUTPUT=/tmp/ci-kubeconfig.yaml FORCE=1
          after="$(stat -c '%Y' /tmp/ci-kubeconfig.yaml)"
          if [[ "${after}" -le "${before}" ]]; then
            echo "::error::FORCE=1 did not overwrite (mtime not advanced: ${before} -> ${after})"
            exit 1
          fi
          echo "ok: FORCE=1 overwrote the kubeconfig"

      - name: Test 5 — hostile --server is rejected
        run: |
          set -euo pipefail
          rm -f /tmp/ci-bad.yaml
          set +e
          # The script validates SERVER_OVERRIDE against a strict regex
          # BEFORE any sed/yq rewrite, so this must exit non-zero and
          # never create the output file.
          out="$(make export-argocd CONFIG="${CONFIG}" OUTPUT=/tmp/ci-bad.yaml \
                  SERVER='https://x";rm -rf /;\n' 2>&1)"
          rc=$?
          set -e
          if [[ "${rc}" -eq 0 ]]; then
            echo "::error::hostile --server was accepted (rc=0)"
            echo "${out}"
            exit 1
          fi
          if [[ -e /tmp/ci-bad.yaml ]]; then
            echo "::error::hostile --server produced output at /tmp/ci-bad.yaml"
            ls -l /tmp/ci-bad.yaml
            exit 1
          fi
          if ! grep -qE "invalid --server" <<<"${out}"; then
            echo "::error::expected 'invalid --server' diagnostic, got:"
            echo "${out}"
            exit 1
          fi
          echo "ok: hostile --server rejected before any rewrite"

      - name: Test 6 — get-kubeconfig sibling (PR #197, gated)
        # Only runs once `make get-kubeconfig` lands. Until then we
        # silently skip — this workflow is meant to fire on every tag
        # build and we don't want a missing-target false-positive.
        run: |
          set -euo pipefail
          # shellcheck disable=SC1090
          source "${CONFIG}"

          if ! make help 2>/dev/null | grep -qE '^[[:space:]]+get-kubeconfig'; then
            echo "skipping: make get-kubeconfig is not yet present (PR #197 unmerged)"
            exit 0
          fi

          rm -f /tmp/ci-get.yaml
          make get-kubeconfig CONFIG="${CONFIG}" OUTPUT=/tmp/ci-get.yaml

          if [[ ! -f /tmp/ci-get.yaml ]]; then
            echo "::error::get-kubeconfig did not produce /tmp/ci-get.yaml"
            exit 1
          fi
          # Should use CP_NAME directly, no hummingbird- prefix.
          if ! grep -qE "name:[[:space:]]+${CP_NAME}\$" /tmp/ci-get.yaml; then
            echo "::error::get-kubeconfig output missing CP_NAME context '${CP_NAME}'"
            exit 1
          fi
          if grep -qE "name:[[:space:]]+hummingbird-${CP_NAME}\$" /tmp/ci-get.yaml; then
            echo "::error::get-kubeconfig leaked hummingbird- prefix into context name"
            exit 1
          fi

          out="$(KUBECONFIG=/tmp/ci-get.yaml \
                 kubectl --insecure-skip-tls-verify=true get nodes --no-headers)"
          if ! grep -qE "^${CP_NAME}[[:space:]]+Ready" <<<"${out}"; then
            echo "::error::get-kubeconfig output is not usable against the cluster"
            echo "${out}"
            exit 1
          fi
          echo "ok: get-kubeconfig sibling works and uses bare CP_NAME context"

      - name: Destroy cluster
        if: always()
        run: |
          set -euo pipefail
          sudo make destroy-cluster CONFIG="${CONFIG}" || true

      - name: Force-clean integration VMs (always)
        if: always()
        run: |
          for vm in $(sudo virsh -c qemu:///system list --all --name 2>/dev/null | grep -E '^hbird-ci-' || true); do
            echo "force-cleaning $vm"
            sudo virsh -c qemu:///system destroy "$vm" >/dev/null 2>&1 || true
            sudo virsh -c qemu:///system undefine --nvram "$vm" >/dev/null 2>&1 || true
          done
          sudo rm -f /var/lib/libvirt/images/hbird-ci-*.qcow2 \
                     /var/lib/libvirt/images/hbird-ci-*-seed.iso \
                     /var/lib/libvirt/images/hbird-ci-*-cloud-init.iso 2>/dev/null || true
          sudo rm -rf /var/lib/libvirt/images/deploy-cluster 2>/dev/null || true

      - name: Clean up isolated podman storage
        if: always()
        run: |
          sudo rm -rf "${PODMAN_ROOT}" "${PODMAN_RUNROOT}" || true

      - name: Clean up exported kubeconfigs
        if: always()
        run: |
          rm -f /tmp/ci-kubeconfig.yaml /tmp/ci-bad.yaml /tmp/ci-get.yaml || true

      - name: Remove runner SSH key
        if: always()
        run: |
          rm -f ~/.ssh/integration_test_key ~/.ssh/integration_test_key.pub || true
