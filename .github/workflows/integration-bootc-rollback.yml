name: Integration — bootc rollback end-to-end (#100)

# Stands up a CP VM on `from_tag`, runs `bootc switch` + `bootc upgrade` to
# `to_tag`, reboots, then runs `bootc rollback` + reboots and verifies the
# VM is back on `from_tag` with the cluster still healthy. Manual-only
# (workflow_dispatch) — same rationale as integration-bootc-upgrade.yml.
#
# Self-hosted runner only (needs /dev/kvm + libvirt + virt-install). The
# `kvm,libvirt` labels gate selection.

on:
  workflow_dispatch:
    inputs:
      from_tag:
        description: 'Starting image tag (e.g. v0.1.11). Without v-prefix is OK.'
        required: true
        type: string
      to_tag:
        description: 'Target image tag we upgrade *to*, then roll back *from* (e.g. v0.1.12).'
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  rollback:
    # No pull_request trigger here, but keep the fork-guard marker per
    # docs/self-hosted-runner.md so additions of a PR trigger stay safe.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, kvm, libvirt]
    timeout-minutes: 60
    # podman in the geary-docker runner container hits
    # `'overlay' is not supported over overlayfs` because the runner's rootfs
    # is itself overlayfs. Force vfs for the whole job; slower but avoids
    # needing fuse-overlayfs on the runner image (#124).
    env:
      STORAGE_DRIVER: vfs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install runner deps (CNI + virtinst)
        run: |
          set -euo pipefail
          need=()
          { ls /usr/lib/cni/bridge >/dev/null 2>&1 \
              || ls /usr/libexec/cni/bridge >/dev/null 2>&1 \
              || ls /opt/cni/bin/bridge >/dev/null 2>&1 ; } \
              || need+=(containernetworking-plugins)
          command -v virt-install >/dev/null 2>&1 || need+=(virtinst)
          command -v virsh        >/dev/null 2>&1 || need+=(libvirt-clients)
          if [[ ${#need[@]} -gt 0 ]]; then
            sudo apt-get update -q
            sudo apt-get install -y -q "${need[@]}"
          fi


      - name: Pull both images
        env:
          FROM_TAG: ${{ inputs.from_tag }}
          TO_TAG: ${{ inputs.to_tag }}
        run: |
          set -euo pipefail
          sudo --preserve-env=STORAGE_DRIVER \
            podman pull "ghcr.io/aatchison/hummingbird-k8s:${FROM_TAG}"
          sudo --preserve-env=STORAGE_DRIVER \
            podman pull "ghcr.io/aatchison/hummingbird-k8s:${TO_TAG}"

      - name: Run bootc rollback integration test
        env:
          FROM_TAG: ${{ inputs.from_tag }}
          TO_TAG: ${{ inputs.to_tag }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          sudo --preserve-env=FROM_TAG,TO_TAG,GITHUB_RUN_ID,STORAGE_DRIVER \
            tests/integration-bootc-rollback.sh "${FROM_TAG}" "${TO_TAG}"

      - name: Force-clean integration VMs (always)
        # Belt-and-suspenders to the in-script `trap cleanup EXIT` in
        # tests/integration-bootc-rollback.sh — that trap is killed when a
        # runner is cancelled or OOM'd, leaving hummingbird-it-* VMs +
        # qcow2s behind (issue #162). Match only the `it-` prefix so we
        # never touch production hummingbird-* VMs. Defensive throughout:
        # MUST NEVER fail the job.
        if: always()
        run: |
          for vm in $(sudo virsh -c qemu:///system list --all --name 2>/dev/null | grep '^hummingbird-it-' || true); do
            echo "force-cleaning $vm"
            sudo virsh -c qemu:///system destroy "$vm" >/dev/null 2>&1 || true
            sudo virsh -c qemu:///system undefine --nvram "$vm" >/dev/null 2>&1 || true
          done
          sudo rm -f /var/lib/libvirt/images/hummingbird-it-*.qcow2 \
                     /var/lib/libvirt/images/hummingbird-it-*-seed.iso 2>/dev/null || true
          sudo rm -rf /var/lib/libvirt/images/integration-runs/* 2>/dev/null || true
