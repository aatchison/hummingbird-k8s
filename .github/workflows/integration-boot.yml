name: Integration — boot-time CP (#32)

# Verifies that a freshly-built hummingbird-k8s image actually boots into a
# single-node control plane: bib → qcow2 → virt-install → wait for
# /var/lib/k8s-init.done → assert one Ready node + hardening checks. Runs on
# every k8s/v* tag push as an auto-verification of the release, and also via
# workflow_dispatch for ad-hoc runs.
#
# Self-hosted runner only (needs /dev/kvm + libvirt + virt-install). The
# `kvm,libvirt` labels gate selection.

on:
  workflow_run:
    workflows: ["Build & publish — hummingbird-k8s"]
    types: [completed]
    branches: ["k8s/v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'k8s tag (e.g., k8s/v0.1.19)'
        required: true
        type: string

jobs:
  boot:
    # Only run when triggered by a SUCCESSFUL upstream build. workflow_dispatch
    # is always allowed. Fork-PR defense-in-depth: no pull_request trigger here.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: [self-hosted, kvm, libvirt]
    timeout-minutes: 30
    # podman in the geary-docker runner container hits
    # `'overlay' is not supported over overlayfs` because the runner's rootfs
    # is itself overlayfs. Force vfs *and* point podman at an isolated,
    # per-run graph root so a stale libpod database (left over with
    # graphDriver=overlay) can't override our vfs choice with the error:
    #   "User-selected graph driver \"vfs\" overwritten by graph driver
    #    \"overlay\" from database — delete libpod local files to resolve"
    # (#124, #139).
    env:
      STORAGE_DRIVER: vfs
      PODMAN_ROOT: /var/lib/integration-storage/${{ github.run_id }}
      PODMAN_RUNROOT: /run/integration-storage/${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve image tag
        id: tag
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            workflow_dispatch)
              tag="${{ inputs.tag }}"
              tag="${tag#k8s/}"
              ;;
            workflow_run)
              # head_branch of the triggering run is e.g. "k8s/v0.1.19"
              tag="${{ github.event.workflow_run.head_branch }}"
              tag="${tag#k8s/}"
              ;;
            push)
              tag="${GITHUB_REF#refs/tags/k8s/}"
              ;;
            *)
              echo "Unhandled event: ${{ github.event_name }}" >&2; exit 1
              ;;
          esac
          if [ -z "$tag" ]; then
            echo "Could not resolve image tag" >&2; exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Using tag: $tag"

      - name: Install runner deps (CNI + virtinst)
        # myoung34/github-runner is minimal; install bib + integration deps
        # on demand. Idempotent.
        run: |
          set -euo pipefail
          need=()
          { ls /usr/lib/cni/bridge >/dev/null 2>&1 \
              || ls /usr/libexec/cni/bridge >/dev/null 2>&1 \
              || ls /opt/cni/bin/bridge >/dev/null 2>&1 ; } \
              || need+=(containernetworking-plugins)
          command -v virt-install >/dev/null 2>&1 || need+=(virtinst)
          command -v virsh        >/dev/null 2>&1 || need+=(libvirt-clients)
          if [[ ${#need[@]} -gt 0 ]]; then
            sudo apt-get update -q
            sudo apt-get install -y -q "${need[@]}"
          fi

      - name: Prepare isolated podman storage
        run: |
          set -euo pipefail
          # Fresh per-run roots so any prior libpod database (which may have
          # been initialized with overlay) does not get re-read and override
          # our vfs choice. Cleaned up in the post step regardless of outcome.
          sudo rm -rf "${PODMAN_ROOT}" "${PODMAN_RUNROOT}"
          sudo mkdir -p "${PODMAN_ROOT}" "${PODMAN_RUNROOT}"

      - name: Pull image
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          sudo --preserve-env=STORAGE_DRIVER,PODMAN_ROOT,PODMAN_RUNROOT \
            podman \
              --storage-driver "${STORAGE_DRIVER}" \
              --root "${PODMAN_ROOT}" \
              --runroot "${PODMAN_RUNROOT}" \
              pull "ghcr.io/aatchison/hummingbird-k8s:${TAG}"

      - name: Run boot integration test
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          sudo --preserve-env=TAG,GITHUB_RUN_ID,STORAGE_DRIVER,PODMAN_ROOT,PODMAN_RUNROOT \
            tests/integration-boot.sh "${TAG}"

      - name: Clean up isolated podman storage
        if: always()
        run: |
          sudo rm -rf "${PODMAN_ROOT}" "${PODMAN_RUNROOT}" || true
