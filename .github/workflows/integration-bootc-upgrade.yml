name: Integration — bootc upgrade end-to-end (#12)

# Stands up a CP VM on `from_tag`, runs `bootc switch` + `bootc upgrade` to
# `to_tag`, reboots, and verifies the new image is booted and k8s is still
# healthy. Manual-only (workflow_dispatch) — it's slower than the boot test
# and only useful when explicitly validating a release pair.
#
# Self-hosted runner only (needs /dev/kvm + libvirt + virt-install). The
# `kvm,libvirt` labels gate selection.

on:
  workflow_dispatch:
    inputs:
      from_tag:
        description: 'Starting image tag (e.g. v0.1.9). Without v-prefix is OK.'
        required: true
        type: string
      to_tag:
        description: 'Target image tag (e.g. v0.1.10).'
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  upgrade:
    # No pull_request trigger here, but keep the fork-guard marker per
    # docs/self-hosted-runner.md so additions of a PR trigger stay safe.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, kvm, libvirt]
    timeout-minutes: 45
    # podman in the geary-docker runner container hits
    # `'overlay' is not supported over overlayfs` because the runner's rootfs
    # is itself overlayfs. Force vfs *and* point podman at an isolated,
    # per-run graph root so a stale libpod database (left over with
    # graphDriver=overlay) can't override our vfs choice with the error:
    #   "User-selected graph driver \"vfs\" overwritten by graph driver
    #    \"overlay\" from database — delete libpod local files to resolve"
    # (#124, #139).
    env:
      STORAGE_DRIVER: vfs
      PODMAN_ROOT: /var/lib/integration-storage/${{ github.run_id }}
      PODMAN_RUNROOT: /run/integration-storage/${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install runner deps (CNI + virtinst)
        # myoung34/github-runner is minimal; install bib + integration deps
        # on demand. Idempotent.
        run: |
          set -euo pipefail
          need=()
          { ls /usr/lib/cni/bridge >/dev/null 2>&1 \
              || ls /usr/libexec/cni/bridge >/dev/null 2>&1 \
              || ls /opt/cni/bin/bridge >/dev/null 2>&1 ; } \
              || need+=(containernetworking-plugins)
          command -v virt-install >/dev/null 2>&1 || need+=(virtinst)
          command -v virsh        >/dev/null 2>&1 || need+=(libvirt-clients)
          if [[ ${#need[@]} -gt 0 ]]; then
            sudo apt-get update -q
            sudo apt-get install -y -q "${need[@]}"
          fi


      - name: Prepare isolated podman storage
        run: |
          set -euo pipefail
          sudo rm -rf "${PODMAN_ROOT}" "${PODMAN_RUNROOT}"
          sudo mkdir -p "${PODMAN_ROOT}" "${PODMAN_RUNROOT}"

      - name: Pull both images
        env:
          FROM_TAG: ${{ inputs.from_tag }}
          TO_TAG: ${{ inputs.to_tag }}
        run: |
          set -euo pipefail
          sudo --preserve-env=STORAGE_DRIVER,PODMAN_ROOT,PODMAN_RUNROOT \
            podman \
              --storage-driver "${STORAGE_DRIVER}" \
              --root "${PODMAN_ROOT}" \
              --runroot "${PODMAN_RUNROOT}" \
              pull "ghcr.io/aatchison/hummingbird-k8s:${FROM_TAG}"
          sudo --preserve-env=STORAGE_DRIVER,PODMAN_ROOT,PODMAN_RUNROOT \
            podman \
              --storage-driver "${STORAGE_DRIVER}" \
              --root "${PODMAN_ROOT}" \
              --runroot "${PODMAN_RUNROOT}" \
              pull "ghcr.io/aatchison/hummingbird-k8s:${TO_TAG}"

      - name: Run bootc upgrade integration test
        env:
          FROM_TAG: ${{ inputs.from_tag }}
          TO_TAG: ${{ inputs.to_tag }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          sudo --preserve-env=FROM_TAG,TO_TAG,GITHUB_RUN_ID,STORAGE_DRIVER,PODMAN_ROOT,PODMAN_RUNROOT \
            tests/integration-bootc-upgrade.sh "${FROM_TAG}" "${TO_TAG}"

      - name: Clean up isolated podman storage
        if: always()
        run: |
          sudo rm -rf "${PODMAN_ROOT}" "${PODMAN_RUNROOT}" || true
