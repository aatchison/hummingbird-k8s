name: Build & publish — hummingbird-k8s-worker

on:
  push:
    tags: ['worker/v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver tag (vX.Y.Z)'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Refuse to publish if the tagged commit isn't on main
        if: github.event_name == 'push'
        run: |
          git fetch --no-tags --depth=1 origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag $GITHUB_REF points to $GITHUB_SHA, not reachable from origin/main." >&2
            exit 1
          fi

      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF#refs/tags/worker/}"
          fi
          if ! [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Version $version is not vX.Y.Z[-pre]" >&2; exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Stub worker-join.env for the OCI build
        run: |
          # Real workers get a per-deploy join command baked at qcow2 time on
          # the operator's host. The published OCI image just needs the file
          # to exist for the COPY directive.
          echo '# placeholder — set per VM at qcow2 build time' > worker-join.env

      - name: Log in to GHCR
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: hummingbird-k8s-worker
          tags: ${{ steps.v.outputs.version }} latest
          containerfiles: Containerfile.k8s-worker
          context: .

      - name: Push to GHCR
        id: push
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ghcr.io/${{ github.repository_owner }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless, OIDC)
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/hummingbird-k8s-worker
          DIGEST: ${{ steps.push.outputs.digest }}
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          if [ -z "$DIGEST" ]; then
            echo "push step did not emit a digest; falling back to podman manifest inspect" >&2
            DIGEST="$(podman manifest inspect --verbose "${IMAGE}:${VERSION}" \
              | jq -r '.Digest // .digest')"
          fi
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "null" ]; then
            echo "could not determine image digest" >&2; exit 1
          fi
          cosign sign --yes "${IMAGE}@${DIGEST}"
